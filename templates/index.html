<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Liberator - OpenClaw</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: rgba(255,255,255,0.03);
            --border: rgba(255,255,255,0.06);
            --accent: #6366f1;
            --accent2: #9333ea;
            --green: #4ade80;
            --yellow: #facc15;
            --red: #f87171;
            --text: #e5e5e5;
            --muted: #737373;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2em;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .glass-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--muted);
            font-size: 0.9em;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: monospace;
        }

        button {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }

        .session-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .session-item {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
        }

        .session-item:hover {
            background: rgba(255,255,255,0.05);
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 10px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            transition: width 0.3s;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: bold;
        }

        .status-running { background: var(--yellow); color: black; }
        .status-complete { background: var(--green); color: black; }
        .status-error { background: var(--red); color: white; }

        .agent-card {
            background: rgba(255,255,255,0.02);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .agent-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .agent-actions button {
            padding: 8px 16px;
            font-size: 0.9em;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 8px;
            max-width: 300px;
            display: none;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦞 Session Liberator</h1>
            <div id="gateway-status">Gateway: Checking...</div>
        </div>

        <div class="grid-2">
            <!-- Left Column: Retrieval -->
            <div class="glass-card">
                <h2>1. Retrieve Session</h2>

                <div class="input-group">
                    <label>DeepSeek Auth Token</label>
                    <input type="password" id="auth-token" placeholder="Paste your userToken from browser">
                    <small style="color: var(--muted);">Get from Application → Local Storage → userToken.value</small>
                </div>

                <button onclick="fetchSessions()" id="fetch-btn">Fetch My Sessions</button>

                <div id="session-list" class="session-list" style="margin-top: 20px; display: none;">
                    <h3>Select a session to liberate:</h3>
                    <div id="sessions-container"></div>
                </div>
            </div>

            <!-- Right Column: OpenClaw Agents -->
            <div class="glass-card">
                <h2>2. Your Liberated Agents</h2>

                <div class="input-group">
                    <label>Agent Name (optional)</label>
                    <input type="text" id="agent-name" placeholder="julius-retrieved">
                </div>

                <button onclick="refreshAgents()">Refresh Agent List</button>

                <div id="agents-list" style="margin-top: 20px;">
                    <p>Loading agents...</p>
                </div>
            </div>
        </div>

        <!-- Progress Toast -->
        <div class="toast" id="progress-toast">
            <div id="toast-title">Retrieving session...</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            </div>
            <div id="toast-detail"></div>
        </div>
    </div>

    <script>
        let currentTaskId = null;

        // Check gateway status on load
        fetch('/api/openclaw/agents')
            .then(r => r.json())
            .then(data => {
                document.getElementById('gateway-status').innerHTML = 'Gateway: <span style="color: var(--green)">Connected</span>';
            })
            .catch(() => {
                document.getElementById('gateway-status').innerHTML = 'Gateway: <span style="color: var(--red)">Offline</span>';
            });

        function fetchSessions() {
            const token = document.getElementById('auth-token').value;
            if (!token) {
                alert('Please enter your auth token');
                return;
            }

            document.getElementById('fetch-btn').disabled = true;
            document.getElementById('fetch-btn').innerText = 'Fetching...';

            fetch('/api/sessions/list', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({auth_token: token})
            })
            .then(r => r.json())
            .then(data => {
                document.getElementById('fetch-btn').disabled = false;
                document.getElementById('fetch-btn').innerText = 'Fetch My Sessions';

                if (data.error) {
                    alert('Error: ' + data.error);
                    return;
                }

                const container = document.getElementById('sessions-container');
                container.innerHTML = '';

                if (data.sessions && data.sessions.length > 0) {
                    data.sessions.forEach(session => {
                        const div = document.createElement('div');
                        div.className = 'session-item';
                        div.innerHTML = `<strong>${session.title || 'Untitled'}</strong><br>
                                        <small>${session.id} • ${new Date(session.created_at).toLocaleString()}</small>`;
                        div.onclick = () => retrieveSession(session.id);
                        container.appendChild(div);
                    });
                    document.getElementById('session-list').style.display = 'block';
                } else {
                    container.innerHTML = '<p>No sessions found</p>';
                }
            });
        }

        function retrieveSession(sessionId) {
            const token = document.getElementById('auth-token').value;
            const agentName = document.getElementById('agent-name').value || `session-${sessionId.slice(0,8)}`;

            const toast = document.getElementById('progress-toast');
            toast.style.display = 'block';
            document.getElementById('toast-title').innerText = 'Retrieving session...';

            fetch('/api/sessions/retrieve', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    auth_token: token,
                    session_id: sessionId,
                    agent_name: agentName
                })
            })
            .then(r => r.json())
            .then(data => {
                currentTaskId = data.task_id;
                pollTaskStatus();
            });
        }

        function pollTaskStatus() {
            if (!currentTaskId) return;

            fetch(`/api/tasks/${currentTaskId}`)
                .then(r => r.json())
                .then(data => {
                    const fill = document.getElementById('progress-fill');
                    const detail = document.getElementById('toast-detail');

                    if (data.progress !== undefined) {
                        fill.style.width = data.progress + '%';
                    }

                    if (data.status === 'complete') {
                        document.getElementById('toast-title').innerHTML = '✅ Session Liberated!';
                        detail.innerHTML = `Agent created: ${data.agent}<br>Workspace: ${data.workspace}`;
                        setTimeout(() => {
                            document.getElementById('progress-toast').style.display = 'none';
                            refreshAgents();
                        }, 5000);
                    } else if (data.status === 'error') {
                        document.getElementById('toast-title').innerHTML = '❌ Error';
                        detail.innerHTML = data.error;
                    } else {
                        setTimeout(pollTaskStatus, 1000);
                    }
                });
        }

        function refreshAgents() {
            fetch('/api/openclaw/agents')
                .then(r => r.json())
                .then(data => {
                    const container = document.getElementById('agents-list');
                    if (data.error) {
                        container.innerHTML = `<p style="color: var(--red)">Error: ${data.error}</p>`;
                        return;
                    }

                    let html = '';
                    data.forEach(agent => {
                        html += `
                            <div class="agent-card">
                                <strong>${agent.name}</strong>
                                <span class="status-badge ${agent.default ? 'status-complete' : ''}">
                                    ${agent.default ? 'default' : ''}
                                </span>
                                <div><small>Model: ${agent.model || 'unknown'}</small></div>
                                <div><small>Workspace: ${agent.workspace}</small></div>
                                <div class="agent-actions">
                                    <button onclick="startAgent('${agent.name}')">Start in Dashboard</button>
                                    <button onclick="openWorkspace('${agent.workspace}')">Open Workspace</button>
                                </div>
                            </div>
                        `;
                    });

                    container.innerHTML = html || '<p>No agents found</p>';
                });
        }

        function startAgent(agentName) {
            fetch(`/api/openclaw/agents/${agentName}/start`, {method: 'POST'})
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'started') {
                        window.open('http://127.0.0.1:18789', '_blank');
                    }
                });
        }

        function openWorkspace(path) {
            // This would open the workspace folder
            alert(`Navigate to: ${path}`);
        }

        // Refresh agents every 30 seconds
        setInterval(refreshAgents, 30000);
        refreshAgents();
    </script>
</body>
</html>
